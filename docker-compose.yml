version: '3.8'

# ============================================================
# Payment Processing System — Docker Compose
# ============================================================
# Infrastructure: MySQL, Zookeeper, Kafka
# Services: api-gateway, auth-service, payment-service,
#           transaction-service, notification-service
# ============================================================

networks:
  payment-network:
    driver: bridge

volumes:
  mysql-auth-data:
  mysql-payment-data:
  mysql-transaction-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:

# ============================================================
# Shared environment variables
# ============================================================
x-common-env: &common-env
  DB_USERNAME: root
  DB_PASSWORD: rootpassword
  JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhTZXJ2aWNlUGF5bWVudFN5c3RlbTIwMjQ=
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

x-service-healthcheck: &service-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

services:

  # ============================================================
  # Zookeeper
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    networks:
      - payment-network
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Kafka
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    networks:
      - payment-network
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # MySQL — Auth DB
  # ============================================================
  mysql-auth:
    image: mysql:8.2
    container_name: mysql-auth
    networks:
      - payment-network
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: auth_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-auth-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # MySQL — Payment DB
  # ============================================================
  mysql-payment:
    image: mysql:8.2
    container_name: mysql-payment
    networks:
      - payment-network
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: payment_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-payment-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=300
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # MySQL — Transaction DB
  # ============================================================
  mysql-transaction:
    image: mysql:8.2
    container_name: mysql-transaction
    networks:
      - payment-network
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: transaction_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-transaction-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=300
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # Auth Service
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: payment/auth-service:latest
    container_name: auth-service
    networks:
      - payment-network
    ports:
      - "8081:8081"
    depends_on:
      mysql-auth:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      <<: *service-healthcheck

  # ============================================================
  # Payment Service
  # ============================================================
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: payment/payment-service:latest
    container_name: payment-service
    networks:
      - payment-network
    ports:
      - "8082:8082"
    depends_on:
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-payment:3306/payment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      <<: *service-healthcheck

  # ============================================================
  # Transaction Service
  # ============================================================
  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    image: payment/transaction-service:latest
    container_name: transaction-service
    networks:
      - payment-network
    ports:
      - "8083:8083"
    depends_on:
      mysql-transaction:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-transaction:3306/transaction_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      <<: *service-healthcheck

  # ============================================================
  # Notification Service
  # ============================================================
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: payment/notification-service:latest
    container_name: notification-service
    networks:
      - payment-network
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      NOTIFICATION_EMAIL_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      <<: *service-healthcheck

  # ============================================================
  # API Gateway
  # ============================================================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: payment/api-gateway:latest
    container_name: api-gateway
    networks:
      - payment-network
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      <<: *service-healthcheck
